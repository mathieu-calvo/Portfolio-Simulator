name: Supabase keepalive

on:
  schedule:
    # Every Monday and Thursday at 09:00 UTC.
    # Max gap is 4 days (Thu -> Mon), comfortably under Supabase's 7-day pause threshold.
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Run SELECT 1 against Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is not set" >&2
            exit 1
          fi
          psql "$DATABASE_URL" -c "SELECT 1;"

      # Supabase's auto-pause detector watches the API surface (PostgREST etc.),
      # not raw Postgres connections, so a psql ping alone is not enough.
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_URL or SUPABASE_ANON_KEY secret is not set" >&2
            exit 1
          fi
          curl -fsS \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/" -o /dev/null
